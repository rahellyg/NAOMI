<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תקשור והעברת מסרים | נעמי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #b87ad4;
      --bg-card: #79418f;
      --accent: #5c2d7a;
      --accent-soft: rgba(92, 45, 122, 0.25);
      --text: #2d2438;
      --text-muted: #4a3d5c;
      --border: rgba(92, 45, 122, 0.4);
      --text-on-accent: #fff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* רקע אחיד כמו בצדדים – ללא גרדיאנט במרכז */
    body::before,
    body::after {
      display: none;
    }

    .side-wand {
      position: fixed;
      left: 1%;
      top: 2%;
      width: auto;
      height: 28vh;
      max-height: 220px;
      object-fit: contain;
      object-position: top left;
      opacity: 0.75;
      z-index: 0;
      pointer-events: none;
    }

    .wand-mobile {
      display: none;
    }

    @media (max-width: 900px) {
      .side-wand { display: none; }
      .wand-mobile {
        display: block;
        width: 60vw;
        max-width: 60%;
        height: auto;
        max-height: none;
        margin: 0 auto 0.75rem;
        object-fit: contain;
        opacity: 0.85;
      }
    }

    @media (max-width: 640px) {
      .mystic-elements span {
        width: 46px;
        height: 46px;
        font-size: 1.1rem;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width:  min(94vw, 1040px);
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 1; filter: brightness(1); }
      50% { opacity: 0.96; filter: brightness(1.06); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.5; transform: scale(0.98); }
      50% { opacity: 0.85; transform: scale(1.03); }
    }

    .title-video-row {
      display: flex;
      align-items: stretch;
      gap: 1.25rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 900px) {
      .title-video-row {
        flex-direction: column;
        align-items: center;
      }
    }

    /* כותרת ראשית */
    header {
      text-align: center;
      padding: 0.5rem 0;
      position: relative;
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .logo {
      font-family: 'Rubik', sans-serif;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      color: #f0ebf8;
      margin-bottom: 2.5rem;
      text-shadow:
        0 0 4px rgba(240, 235, 248, 0.9),
        0 0 12px rgba(240, 235, 248, 0.7),
        0 0 24px rgba(240, 235, 248, 0.5),
        0 0 48px rgba(240, 235, 248, 0.35),
        0 0 80px rgba(240, 235, 248, 0.2);
      animation: sparkle 3.5s ease-in-out infinite;
    }

    .title-star {
      display: block;
      color: #fff;
      font-size: 0.9rem;
      margin: 0;
      line-height: 0.9;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
    }

    h1 .title-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    h1 .title-link:hover {
      text-decoration: underline;
    }

    h1 .title-link.first-sentence {
      color: #000;
      text-shadow: none;
      font-size: 0.9em;
    }

    h1 .title-link .title-star:hover {
      text-decoration: none;
    }

    h1 {
      font-family: 'Rubik', sans-serif;
      font-weight: 500;
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      line-height: 1.25;
      margin-bottom: 0;
      color: #f0ebf8;
      text-shadow:
        0 0 6px rgba(240, 235, 248, 0.85),
        0 0 16px rgba(240, 235, 248, 0.6),
        0 0 32px rgba(240, 235, 248, 0.45),
        0 0 56px rgba(240, 235, 248, 0.3),
        0 0 96px rgba(240, 235, 248, 0.2);
      animation: sparkle 3.2s ease-in-out infinite 0.3s;
    }

    .sparkle {
      position: absolute;
      font-size: 0.75rem;
      color: rgba(240, 235, 248, 0.8);
      text-shadow: 0 0 6px rgba(240, 235, 248, 0.45);
      pointer-events: none;
      animation: twinkle 2.5s ease-in-out infinite;
    }
    .sparkle:nth-child(1) { top: 8%; left: 12%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 15%; right: 18%; animation-delay: 0.4s; }
    .sparkle:nth-child(3) { top: 22%; left: 22%; animation-delay: 0.8s; }
    .sparkle:nth-child(4) { top: 12%; right: 8%; animation-delay: 0.2s; }
    .sparkle:nth-child(5) { top: 28%; left: 8%; animation-delay: 0.6s; }
    .sparkle:nth-child(6) { top: 18%; right: 28%; animation-delay: 1s; }
    .sparkle:nth-child(7) { top: 5%; left: 25%; animation-delay: 0.1s; }
    .sparkle:nth-child(8) { top: 25%; right: 5%; animation-delay: 0.5s; }
    .sparkle:nth-child(9) { top: 10%; right: 25%; animation-delay: 0.7s; }
    .sparkle:nth-child(10) { top: 30%; left: 15%; animation-delay: 0.3s; }

    .tagline {
      font-weight: 300;
      font-size: 1rem;
      color: var(--text-muted);
    }

    .page-content {
      text-align: center;
      padding: 2rem 1.5rem 4rem;
      max-width: 36rem;
      margin: 0 auto;
    }

    .page-content p {
      font-size: 1.15rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .page-content p:last-child {
      margin-bottom: 0;
    }

    .mystic-elements {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.9rem;
      margin-top: 1rem;
    }

    .mystic-elements span {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 1.25rem;
      box-shadow: 0 0 24px rgba(230, 184, 255, 0.18);
    }

    .section-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin: 0.75rem 0 1.75rem;
      color: var(--accent);
      opacity: 0.9;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      width: clamp(80px, 18vw, 180px);
      height: 1px;
      background: linear-gradient(to left, transparent, var(--border), transparent);
    }

    .intro-text {
      margin-top: 1.5rem;
      padding: 1.5rem 0;
      font-weight: 300;
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--text);
    }

    .intro-text .tags {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .intro-text .cta {
      margin-top: 1rem;
      font-weight: 500;
      color: var(--text);
    }

    /* קישורים לרשתות */
    .links-form-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: nowrap;
      margin-bottom: 2rem;
    }

    @media (max-width: 900px) {
      .links-form-row {
        flex-wrap: wrap;
      }
    }

    .links-form-row .social {
      flex: 0 0 auto;
      flex-direction: row;
      margin-bottom: 0;
      gap: 0.75rem;
    }

    .links-form-row .channel-intro {
      flex: 1 1 auto;
      margin-top: 0;
      min-width: 0;
    }

    .social {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    /* From https://css.glass */
    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      color: rgba(255, 255, 255, 0.98);
      text-decoration: none;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.39);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.43);
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .social a:hover {
      background: rgba(255, 255, 255, 0.48);
      border-color: rgba(255, 255, 255, 0.55);
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    @supports not (backdrop-filter: blur(5px)) {
      .social a {
        background: rgba(255, 255, 255, 0.5);
      }
    }

    .social a svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .social a .link-sparkle {
      font-size: 0.65em;
      opacity: 0.9;
      margin: 0 0.15em;
      animation: twinkle 2s ease-in-out infinite;
    }
    .social a .link-sparkle:first-child { animation-delay: 0s; }
    .social a .link-sparkle:last-child { animation-delay: 0.5s; }

    .page-content {
      position: relative;
    }
    .page-sparkle {
      position: absolute;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
      pointer-events: none;
      animation: twinkle 2.5s ease-in-out infinite;
    }
    .page-content .page-sparkle:nth-child(1) { top: 5%; left: 8%; animation-delay: 0s; }
    .page-content .page-sparkle:nth-child(2) { top: 20%; right: 10%; animation-delay: 0.3s; }
    .page-content .page-sparkle:nth-child(3) { top: 40%; left: 5%; animation-delay: 0.6s; }
    .page-content .page-sparkle:nth-child(4) { top: 60%; right: 8%; animation-delay: 0.2s; }
    .page-content .page-sparkle:nth-child(5) { top: 80%; left: 12%; animation-delay: 0.9s; }
    .page-content .page-sparkle:nth-child(6) { top: 15%; right: 18%; animation-delay: 0.1s; }
    .page-content .page-sparkle:nth-child(7) { top: 70%; left: 20%; animation-delay: 0.5s; }
    .page-content .page-sparkle:nth-child(8) { top: 35%; right: 5%; animation-delay: 0.7s; }

    .channel-intro-youtube {
      position: relative;
    }
    .channel-intro-youtube .page-sparkle:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
    .channel-intro-youtube .page-sparkle:nth-child(2) { top: 5%; right: 5%; animation-delay: 0.4s; }
    .channel-intro-youtube .page-sparkle:nth-child(3) { top: 50%; left: 2%; animation-delay: 0.2s; }
    .channel-intro-youtube .page-sparkle:nth-child(4) { top: 50%; right: 2%; animation-delay: 0.6s; }
    .channel-intro-youtube .page-sparkle:nth-child(5) { bottom: 10%; left: 10%; top: auto; animation-delay: 0.1s; }
    .channel-intro-youtube .page-sparkle:nth-child(6) { bottom: 10%; right: 10%; top: auto; animation-delay: 0.5s; }

    .channel-intro {
      position: relative;
    }
    .channel-intro .page-sparkle:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; }
    .channel-intro .page-sparkle:nth-child(2) { top: 25%; right: 5%; animation-delay: 0.5s; }
    .channel-intro .page-sparkle:nth-child(3) { top: 50%; left: 5%; animation-delay: 0.2s; }
    .channel-intro .page-sparkle:nth-child(4) { top: 75%; right: 10%; animation-delay: 0.7s; }
    .channel-intro .page-sparkle:nth-child(5) { bottom: 25%; left: 12%; top: auto; animation-delay: 0.3s; }
    .channel-intro .page-sparkle:nth-child(6) { bottom: 15%; right: 8%; top: auto; animation-delay: 0.4s; }

    /* בלוק טקסט – ללא מסגרת */
    .content-block {
      padding: 1.5rem 0;
      margin-bottom: 1rem;
    }

    .content-block h2 {
      font-family: 'Rubik', sans-serif;
      font-weight: 500;
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 1rem;
      text-align: center;
    }

    .content-block p {
      font-weight: 300;
      font-size: 1rem;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 0.9rem;
    }

    .content-block p:last-child {
      margin-bottom: 0;
    }

    .channel-intro {
      padding: 1.5rem 0 2rem;
      margin-top: 0.5rem;
      text-align: right;
      max-width: min(96vw, 980px);
      margin-left: auto;
      margin-right: auto;
    }

    .channel-intro p {
      font-weight: 300;
      font-size: 1.22rem;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 0.85rem;
    }

    .channel-intro p.main-copy {
      font-size: 1.42rem;
      line-height: 2;
    }

    .channel-intro p:last-child {
      margin-bottom: 0;
    }

    .channel-intro .highlight {
      color: var(--accent);
      font-weight: 500;
    }

    .how-it-starts {
      margin: 1.5rem 0 1.75rem;
      padding: 1.25rem 1.25rem 1.1rem;
      background: linear-gradient(135deg, rgba(230, 184, 255, 0.12), rgba(26, 24, 36, 0.8));
      border: 1px solid var(--border);
      border-right: 4px solid var(--accent);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }

    .how-it-starts h3 {
      font-family: 'Rubik', sans-serif;
      font-weight: 600;
      font-size: 1.15rem;
      color: var(--accent);
      margin-bottom: 0.7rem;
      text-align: right;
    }

    .how-it-starts p {
      font-size: 1.06rem;
      line-height: 1.9;
      margin-bottom: 0.65rem;
    }

    .how-it-starts p:last-child {
      margin-bottom: 0;
    }

    .welcome-highlight {
      position: relative;
      margin: 1.1rem auto 1.5rem;
      padding: 0.85rem 1.1rem;
      max-width: 720px;
      text-align: center;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(156, 39, 176, 0.42), rgba(230, 184, 255, 0.22));
      border: 1px solid rgba(230, 184, 255, 0.55);
      box-shadow: 0 0 28px rgba(156, 39, 176, 0.35);
      overflow: hidden;
    }

    .welcome-highlight .welcome-text {
      margin: 0;
      font-family: 'Rubik', sans-serif;
      font-size: clamp(1.35rem, 2.7vw, 1.8rem);
      font-weight: 600;
      color: #f3deff;
      letter-spacing: 0.03em;
      text-shadow: 0 0 12px rgba(230, 184, 255, 0.5);
      position: relative;
      z-index: 2;
    }

    .welcome-highlight .float {
      position: absolute;
      color: rgba(243, 222, 255, 0.8);
      font-size: 1rem;
      z-index: 1;
      animation: floatSpark 4.2s ease-in-out infinite;
    }

    .welcome-highlight .float-1 {
      top: 20%;
      right: 10%;
      animation-delay: 0s;
    }

    .welcome-highlight .float-2 {
      top: 58%;
      left: 12%;
      animation-delay: 0.7s;
    }

    .welcome-highlight .float-3 {
      top: 35%;
      left: 48%;
      animation-delay: 1.4s;
    }

    @keyframes floatSpark {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.5; }
      50% { transform: translateY(-8px) scale(1.15); opacity: 1; }
    }

    .channel-intro-form {
      max-width: 320px;
      margin: 1.5rem auto 1.25rem;
    }

    .channel-intro-form .form-group {
      margin-bottom: 1rem;
    }

    .channel-intro-form .form-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .channel-intro-form .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }

    .channel-intro-form .form-group input::placeholder {
      color: var(--text-muted);
    }

    .channel-intro-form .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .channel-intro-cta-wrap {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    .channel-intro-youtube {
      flex: 1 1 300px;
      flex-shrink: 0;
      border-radius: 12px;
      overflow: hidden;
      border: none;
      line-height: 0;
      margin-left: auto;
      margin-right: auto;
      max-width: 560px;
      width: 100%;
      margin-bottom: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 260px;
    }

    .title-video-row .channel-intro-youtube {
      min-height: 280px;
    }

    .title-video-row header {
      min-height: 280px;
    }

    .channel-intro-youtube iframe {
      display: block;
      width: 100%;
      max-width: 560px;
      height: auto;
      aspect-ratio: 16 / 9;
      min-height: 220px;
      border: 0;
    }

    .title-video-row .channel-intro-youtube iframe {
      min-height: 260px;
    }

    .channel-intro-cta {
      margin-top: 0;
      display: flex;
      align-items: center;
    }

    .channel-intro .cta-link {
      display: inline-block;
      padding: 0.9rem 1.75rem;
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .channel-intro .cta-link:hover {
      background: rgba(201, 168, 108, 0.12);
      border-color: #d4b87a;
      transform: translateY(-2px);
    }

    .channel-intro .cta-link.btn {
      background: var(--accent);
      color: var(--text-on-accent);
      border-color: var(--accent);
    }

    .channel-intro .cta-link.btn:hover {
      background: #d4b87a;
      color: #2d2438;
      border-color: #d4b87a;
    }

    .elements-showcase {
      padding: 0.5rem 0 1.75rem;
      text-align: center;
    }

    .elements-showcase img {
      width: min(100%, 462px);
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .channel-intro .intro-divider {
      margin: 1.75rem 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      letter-spacing: 0.3em;
    }

    .channel-intro .intro-subtitle {
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .content-block .highlight {
      color: var(--accent);
      font-weight: 500;
    }

    .content-block .quote {
      font-style: italic;
      padding: 0 0.5rem;
      border-right: 3px solid var(--accent);
      margin: 1rem 0;
      color: var(--text-muted);
    }

    .content-block.with-img {
      overflow: hidden;
    }

    .content-block .section-img-wrap {
      width: 100%;
      margin-bottom: 1.25rem;
      border-radius: 12px;
      overflow: hidden;
    }

    .content-block .section-img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 320px;
      object-fit: contain;
      object-position: center;
    }

    .content-block .services-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
      justify-content: center;
    }

    .content-block .service-pill {
      background: var(--bg-deep);
      color: var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
    }

    /* מחירון – ללא מסגרת */
    .pricing-section {
      padding: 1.5rem 0;
      margin-bottom: 2rem;
    }

    .pricing-section h2 {
      font-family: 'Rubik', sans-serif;
      font-weight: 500;
      font-size: 1.25rem;
      color: var(--accent);
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .pricing-unavailable {
      text-align: center;
      color: var(--text-muted);
      font-weight: 400;
    }

    .pricing-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }

    .pricing-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .pricing-item .name {
      font-weight: 400;
      color: var(--text);
    }

    .pricing-item .price {
      font-family: 'Rubik', sans-serif;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    /* טופס – נשאר במרובע */
    .form-section {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-card);

    }

      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

      color: #2d2438;
      transform: translateY(-1px);
    }

      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;

      color: #a5d6a7;
      display: block;
    }

    .form-message.error {

      color: #ef9a9a;
      display: block;
    }

    footer {

    footer a {

    }

      text-decoration: underline;
    }
