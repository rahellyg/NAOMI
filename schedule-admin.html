<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול | דף בית</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Rubik:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #b87ad4;
      --accent: #5c2d7a;
      --text: #2d2438;
      --muted: #4a3d5c;
      --white-glass: rgba(255, 255, 255, 0.39);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 {
      font-family: 'Rubik', sans-serif;
      font-size: 1.35rem;
      color: var(--accent);
      margin-bottom: 0.35rem;
      text-align: center;
    }
    .sub {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .card {
      background: var(--white-glass);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.43);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }
    label { display: block; font-size: 0.88rem; margin-bottom: 0.35rem; color: var(--muted); }
    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid rgba(92, 45, 122, 0.35);
      font-family: inherit;
      margin-bottom: 0.75rem;
    }
    button {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0.35rem;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .msg { margin-top: 0.75rem; padding: 0.6rem; border-radius: 8px; font-size: 0.88rem; text-align: center; display: none; }
    .msg.err { display: block; background: rgba(255, 245, 245, 0.95); color: #8b1532; border: 1px solid rgba(198, 40, 40, 0.35); }
    #login-gate { margin-top: 2rem; }
    #admin-hub[hidden] { display: none !important; }
    .hub-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .hub-grid a {
      display: block;
      padding: 1rem 1.15rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.5);
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid rgba(92, 45, 122, 0.28);
      text-align: center;
      transition: background 0.15s, transform 0.12s;
    }
    .hub-grid a:hover {
      background: rgba(255, 255, 255, 0.78);
      transform: scale(1.01);
    }
    .hub-grid a span {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-top: 0.35rem;
    }
    .site-credit-wrap {
      text-align: center;
      margin-top: 1.5rem;
      padding: 0 0.5rem 1.25rem;
    }
    .site-credit {
      font-size: 0.875rem;
      line-height: 1.5;
      color: #1a1a1a;
      margin: 0;
    }
    .site-credit-link {
      font-weight: 600;
      text-decoration: underline;
      color: #1565c0;
    }
    .site-credit-link:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ניהול האתר</h1>
    <p class="sub">דף פרטי – אל תשתפי קישור. אחרי הכניסה בוחרים אזור: לוח זמינות, פגישות, או שאלות מהדף.</p>

    <div id="login-gate" class="card">
      <h2>כניסה</h2>
      <label for="admin-pass">סיסמה</label>
      <input type="password" id="admin-pass" autocomplete="current-password" placeholder="הסיסמה שהגדרת בקוד">
      <button type="button" class="btn-primary" id="btn-login">כניסה לניהול</button>
      <p class="msg err" id="login-err"></p>
    </div>

    <div id="admin-hub" hidden>
      <div class="card">
        <h2>בחירת אזור</h2>
        <nav class="hub-grid" aria-label="ניהול">
          <a href="schedule-admin-availability.html">זמינות ולוח פגישות<span>חסימות, שעות, שמירה ל־naomi-availability.json</span></a>
          <a href="schedule-admin-bookings.html">פגישות שנקבעו<span>רשימה, וואטסאפ, GitHub / Supabase</span></a>
          <a href="schedule-admin-questions.html">שאלות מהדף<span>טופס „שאלה ממוקדת”, מייל ורישום</span></a>
        </nav>
      </div>
    </div>
    <footer class="site-credit-wrap" role="contentinfo">
      <p class="site-credit">
        נבנה על ידי
        <a
          href="https://rahellyg.github.io/busipro/"
          target="_blank"
          rel="noopener noreferrer"
          class="site-credit-link"
        >BusiPro</a>
      </p>
    </footer>
  </div>

  <script>
    var ADMIN_PASSWORD = '123456';
    var ADMIN_SESSION_KEY = 'naomi_schedule_admin_ok_v1';

    function isAdminSessionOk() {
      try {
        return sessionStorage.getItem(ADMIN_SESSION_KEY) === '1';
      } catch (e) {
        return false;
      }
    }
    function setAdminSessionOk() {
      try {
        sessionStorage.setItem(ADMIN_SESSION_KEY, '1');
      } catch (e) {}
    }

    document.getElementById('btn-login').addEventListener('click', function() {
      var pass = (document.getElementById('admin-pass').value || '').trim();
      var err = document.getElementById('login-err');
      if (pass !== ADMIN_PASSWORD) {
        err.textContent = 'סיסמה שגויה';
        err.style.display = 'block';
        return;
      }
      err.style.display = 'none';
      setAdminSessionOk();
      document.getElementById('login-gate').hidden = true;
      document.getElementById('admin-hub').hidden = false;
    });

    if (isAdminSessionOk()) {
      document.getElementById('login-gate').hidden = true;
      document.getElementById('admin-hub').hidden = false;
    }
  </script>
</body>
</html>
